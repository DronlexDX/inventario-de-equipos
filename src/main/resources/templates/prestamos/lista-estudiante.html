<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Préstamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

<nav class="flex justify-between items-center bg-white p-4 rounded-lg shadow mb-8 max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800">Mis Equipos</h1>
    <a th:href="@{/equipos}" class="text-blue-600 hover:underline font-medium">Volver al Catálogo</a>
</nav>

<div class="max-w-6xl mx-auto bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
        <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
            <th class="py-3 px-6">Equipo</th>
            <th class="py-3 px-6">Fecha de Préstamo</th>
            <th class="py-3 px-6">Devolución Esperada</th>
            <th class="py-3 px-6">Estado</th>
            <th class="py-3 px-6 text-center">Acción</th>
        </tr>
        </thead>
        <tbody class="text-gray-700 text-sm font-light">
        <tr th:each="prestamo : ${prestamos}" class="border-b border-gray-200 hover:bg-gray-50">
            <td class="py-3 px-6 font-medium" th:text="${prestamo.equipo.nombre}">Osciloscopio</td>
            <td class="py-3 px-6" th:text="${prestamo.fechaPrestamo}">2023-10-01</td>
            <td class="py-3 px-6" th:text="${prestamo.fechaDevolucionEsperada}">2023-10-04</td>

            <td class="py-3 px-6">
                <span th:text="${prestamo.estado}"
                      th:class="${prestamo.estado.name() == 'ACTIVO' ? 'bg-yellow-200 text-yellow-800 py-1 px-3 rounded-full text-xs' : 'bg-green-200 text-green-800 py-1 px-3 rounded-full text-xs'}">
                    ACTIVO
                </span>
            </td>

            <td class="py-3 px-6 text-center">
                <form th:if="${prestamo.estado.name() == 'ACTIVO'}"
                      th:action="@{/prestamos/devolver}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="prestamoId" th:value="${prestamo.id}">
                    <button type="submit" class="bg-indigo-500 text-white px-4 py-1 rounded hover:bg-indigo-600">
                        Devolver
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(prestamos)}" class="text-center py-8 text-gray-500">
        Aún no tienes ningún préstamo registrado.
    </div>
</div>

</body>
</html>
