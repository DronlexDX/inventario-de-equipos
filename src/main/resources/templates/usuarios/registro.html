<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Crear Cuenta</h2>

    <form th:action="@{/usuarios/registro}" th:object="${usuario}" method="post" class="space-y-4">

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Nombre Completo</label>
            <input type="text" th:field="*{nombre}" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Correo Electrónico</label>
            <input type="email" th:field="*{correo}" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
            <input type="password" th:field="*{contrasena}" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit"
                class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition mt-4">
            Registrarse
        </button>

        <div class="text-center mt-4">
            <a th:href="@{/usuarios/login}" class="text-sm text-blue-600 hover:underline">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </form>
</div>

</body>
</html>
