<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Equipos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

<nav class="flex justify-between items-center bg-white p-4 rounded-lg shadow mb-8 max-w-6xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800">Catálogo de Préstamos</h1>

  <div class="flex gap-4 items-center">
    <a th:if="${esAdmin}"
       th:href="@{/equipos/nuevo}"
       class="text-green-600 hover:underline font-medium">
      Agregar Equipo
    </a>

    <a th:href="@{/prestamos/mis-prestamos}"
       class="text-blue-600 hover:underline font-medium">
      Mis Préstamos
    </a>

    <form th:action="@{/usuarios/logout}" method="post" class="inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="text-red-600 hover:underline font-medium">
        Cerrar Sesión
      </button>
    </form>
  </div>
</nav>

<div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
  <div th:each="equipo : ${equipos}"
       class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500 flex flex-col justify-between">

    <div>
      <h2 class="text-xl font-semibold text-gray-800" th:text="${equipo.nombre}">Nombre</h2>
      <p class="text-gray-600 mt-2 text-sm" th:text="${equipo.descripcion}">Descripción</p>
    </div>

    <div class="mt-6">
      <div class="flex justify-between items-center mb-4">
                <span class="text-sm font-medium px-2 py-1 rounded"
                      th:classappend="${equipo.cantidadDisponible > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}"
                      th:text="${equipo.cantidadDisponible > 0 ? 'Disponible: ' + equipo.cantidadDisponible : 'Agotado'}">
                </span>
      </div>

      <!-- BOTÓN PARA ESTUDIANTE -->
      <form th:if="${!esAdmin && equipo.cantidadDisponible > 0}"
            th:action="@{/prestamos/solicitar}"
            method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="equipoId" th:value="${equipo.id}">
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
          Solicitar Equipo
        </button>
      </form>

      <!-- BOTÓN PARA ADMIN -->
      <form th:if="${esAdmin}"
            th:action="@{'/equipos/eliminar/' + ${equipo.id}}"
            method="post"
            onsubmit="return confirm('¿Seguro que deseas eliminar este equipo?');">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 transition">
          Eliminar Equipo
        </button>
      </form>

      <button th:if="${equipo.cantidadDisponible == 0}"
              disabled
              class="w-full bg-gray-300 text-gray-500 py-2 rounded cursor-not-allowed mt-2">
        No Disponible
      </button>
    </div>
  </div>
</div>

</body>
</html>
