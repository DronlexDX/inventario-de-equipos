<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Equipo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

<nav class="flex justify-between items-center bg-white p-4 rounded-lg shadow mb-8 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800">Agregar Nuevo Equipo</h1>
    <a th:href="@{/equipos}" class="text-blue-600 hover:underline font-medium">Volver al Catálogo</a>
</nav>

<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md border-t-4 border-indigo-500">

    <form th:action="@{/equipos/guardar}" th:object="${equipo}" method="post" class="space-y-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <input type="hidden" th:field="*{id}">

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Nombre del Equipo</label>
            <input type="text" th:field="*{nombre}" placeholder="Ej. Osciloscopio Digital" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Descripción</label>
            <textarea th:field="*{descripcion}" rows="3" placeholder="Detalles técnicos o estado del equipo..."
                      class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Cantidad Total en Inventario</label>
            <input type="number" th:field="*{cantidadTotal}" min="1" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <p class="text-xs text-gray-500 mt-1">La cantidad disponible se asignará automáticamente igual al total inicial.</p>
        </div>

        <div class="flex justify-end pt-4">
            <button type="submit"
                    class="bg-indigo-600 text-white font-bold py-2 px-6 rounded hover:bg-indigo-700 transition shadow">
                Guardar Equipo
            </button>
        </div>
    </form>
</div>

</body>
</html>
